{% extends "base.html" %}
{% block title %}變更密碼 — NCCM{% endblock %}
{% block content %}
<section class="login-card change-password-card">
  <h1>請立即變更密碼</h1>
  <p class="lead">首次登入須設定新密碼後，才能使用其他功能。</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/account/change-password">
    <label>目前密碼</label>
    <input name="current_password" type="password" required autocomplete="current-password" />
    <label>新密碼（≥12 字元）</label>
    <input name="new_password" type="password" required autocomplete="new-password" minlength="12" />
    <label>確認新密碼</label>
    <input name="confirm_password" type="password" required autocomplete="new-password" minlength="12" />
    <button type="submit">儲存並繼續</button>
  </form>
</section>
{% endblock %}
