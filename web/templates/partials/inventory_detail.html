<h2>設備詳情</h2>
{% if snapshots %}
<form class="version-pick"
      hx-get="/inventory/partial/detail"
      hx-target="#inv-detail"
      hx-trigger="change"
      hx-include="this">
  <input type="hidden" name="device_id" value="{{ device_id }}" />
  <label>備份版本</label>
  <select name="snapshot_id">
    {% for s in snapshots %}
    <option value="{{ s.id }}" {% if snapshot_id == s.id %}selected{% endif %}>
      {{ s.created_at }} — {{ s.sw_version }}
    </option>
    {% endfor %}
  </select>
</form>
<div class="config-header">
  <h3>Running-Configuration</h3>
  {% if snapshot_id and portal_role == 'admin' %}
  <a class="btn-secondary config-download"
     href="/inventory/download/config?snapshot_id={{ snapshot_id }}&device_id={{ device_id | urlencode }}">下載</a>
  <span class="config-restore-warn" title="還原前請自行確認格式與設備相容性">⚠ 下載檔可能無法直接用於還原，請勿未經驗證即套用至生產設備。</span>
  {% endif %}
</div>
<pre class="config-preview">{{ config_preview }}</pre>
{% else %}
<p class="muted">此設備尚無成功備份快照。</p>
{% endif %}
