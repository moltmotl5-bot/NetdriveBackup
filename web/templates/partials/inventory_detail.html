<h2>設備詳情</h2>
<p class="meta">device_id: <code>{{ device_id }}</code></p>
{% if snapshots %}
<form class="version-pick"
      hx-get="/inventory/partial/detail"
      hx-target="#inv-detail"
      hx-trigger="change"
      hx-include="this">
  <input type="hidden" name="device_id" value="{{ device_id }}" />
  <label>備份版本</label>
  <select name="snapshot_id">
    {% for s in snapshots %}
    <option value="{{ s.id }}" {% if snapshot_id == s.id %}selected{% endif %}>
      {{ s.created_at }} — {{ s.sw_version }}
    </option>
    {% endfor %}
  </select>
</form>
<h3>Running-Configuration</h3>
<pre class="config-preview">{{ config_preview }}</pre>
{% else %}
<p class="muted">此設備尚無成功備份快照。</p>
{% endif %}
