<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}NetdriverBackup{% endblock %}</title>
  <link rel="stylesheet" href="/static/nccm.css" />
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">🛡️ NCCM v3</div>
      <p class="meta">Agent: <span class="{% if agent_ok %}ok{% else %}bad{% endif %}">{{ agent_status }}</span></p>
      <nav>
        {% for key, label, href in nav %}
        <a href="{{ href }}" class="{% if active == key %}active{% endif %}">{{ label }}</a>
        {% endfor %}
      </nav>
      {% if portal_user %}<p class="meta">使用者: {{ portal_user }}{% if portal_role %} ({{ portal_role }}){% endif %}</p>{% endif %}
      <a class="logout" href="/logout">登出</a>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% block scripts %}{% endblock %}
  </body>
</html>
