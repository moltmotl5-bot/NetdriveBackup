api:
  request_log_level: INFO
logging:
  level: INFO
  log_file: logs/agent.log
  intercept_loggers:
    - uvicorn.access
    - uvicorn.error
session:
  check_interval: 30
  read_buffer_size: 1048576
  ssh:
    login_timeout: 20
    connect_timeout: 30
    keepalive_interval: 60
    keepalive_count_max: 3
    term_size:
      width: 1000
      height: 100
  profiles:
    global:
      read_timeout: 30.0
      expiration_time: "16:00"
      max_idle_time: 600.0
      server_host_key_algs: []
    vendor:
      cisco:
        nexus:
          base:
            read_timeout: 120.0
            expiration_time: "16:00"
            max_idle_time: 600.0
            server_host_key_algs: []
      fortinet:
        fortigate:
          base:
            read_timeout: 180.0
            expiration_time: "16:00"
            max_idle_time: 600.0
            server_host_key_algs: []
      huawei:
        ce:
          base:
            read_timeout: 120.0
            expiration_time: "16:00"
            max_idle_time: 600.0
            server_host_key_algs: []