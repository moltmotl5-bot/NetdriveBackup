# NetdriverBackup NCCM v3 — Docker Compose (Portal + NetDriver Agent)
#
# 啟動：docker compose up -d --build
# 停止：docker compose down
#
# Agent unhealthy 常見原因：舊版 agent-logs volume 權限（uid 1000 無法寫入）。
# 修復：docker compose down -v && docker compose up -d --build

name: netdriverbackup-nccm

services:
  netdriver-agent:
    build:
      context: ./netdrive-agent
      dockerfile: packages/agent/Dockerfile
    image: netdriverbackup-netdriver-agent:local
    container_name: nccm-netdriver-agent
    restart: unless-stopped
    environment:
      NETDRIVER_AGENT_CONFIG: /app/config/agent/agent.yml
    volumes:
      - ./deploy/config/agent:/app/config/agent:ro
      # 勿掛載 root-owned named volume 到 /app/logs；Agent 以 uid 1000 執行，寫 log 失敗會起不來。
      # 日誌請用：docker compose logs -f netdriver-agent
    ports:
      - "${NETDRIVER_AGENT_PORT:-8000}:8000"
    networks:
      - nccm
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  portal:
    build:
      context: .
      dockerfile: docker/Dockerfile.portal
    image: netdriverbackup-portal:local
    container_name: nccm-portal
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    environment:
      NCCM_NETDRIVER_URL: http://netdriver-agent:8000
      NCCM_STORE_DIR: /data/store
      NCCM_APP_ROOT: /app
    volumes:
      - ./store:/data/store
    ports:
      - "${NCCM_PORT:-8501}:8501"
    depends_on:
      netdriver-agent:
        condition: service_healthy
    networks:
      - nccm
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8501/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

networks:
  nccm:
    driver: bridge