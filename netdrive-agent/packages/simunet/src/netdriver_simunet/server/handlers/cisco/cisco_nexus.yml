# Cisco Nexus
start_mode: enable
hostname: nxos
line_feed: "\r\n"
enable_password: ""
modes:
  enable:
    prompt: "# "
    switch_mode_cmds:
      - "configure terminal"
      - "exit"
    cmds: []
  config:
    prompt: "(config)# "
    switch_mode_cmds:
      - "exit"
      - "end"
    cmds:
    - cmd: "hostname nxos"
      output: ""
    - cmd: "copy running-config startup-config"
      output: |
        [########################################] 100%
        Copy complete, now saving to disk (please wait)...
        Copy complete.
